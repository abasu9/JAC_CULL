[project]
name = "hr_insights_copilot"
version = "1.0.0"
description = "Hackathon-ready agentic HR insights copilot built with Jac, Jac Builder, and Jaseci"
entry-point = "main.jac"

[dependencies]
[dependencies.npm]
jac-client-node = "1.0.7"
"@tailwindcss/vite" = "^4.1.17"
tailwindcss = "^4.1.17"

[dependencies.npm.dev]
"@jac-client/dev-deps" = "2.0.0"

[dev-dependencies]
watchdog = ">=3.0.0"

[plugins]
[plugins.client]
[plugins.client.vite]
plugins = ["tailwindcss()"]
lib_imports = ["import tailwindcss from '@tailwindcss/vite'"]

[serve]
base_route_app = "app"

[jacpack]
name = 'hr_insights_copilot'
description = 'Jac IDE snapshot for HR Insights Copilot'
